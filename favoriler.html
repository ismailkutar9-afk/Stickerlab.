<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Favorilerim — StickerLab</title>
<link href="https://fonts.googleapis.com/css2?family=Bowlby+One&family=Familjen+Grotesk:wght@400;500;600;700&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#FFF8E7;--ink:#1A1A1A;--hot:#FF3D5A;--lime:#C8FF3D;--sky:#4DCBFF;--plum:#6E2BFF;--cream:#FFEDB8;--paper:#FFFDF5;--shadow:6px 6px 0 var(--ink);--shadow-lg:10px 10px 0 var(--ink)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:'Familjen Grotesk',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body{background-image:radial-gradient(circle at 1px 1px,rgba(0,0,0,.07) 1px,transparent 0);background-size:22px 22px}
a{color:inherit;text-decoration:none}button{font-family:inherit;cursor:pointer;border:none;background:none}
.nav{display:flex;align-items:center;justify-content:space-between;padding:16px 40px;border-bottom:3px solid var(--ink);background:var(--bg);position:sticky;top:0;z-index:200}
.logo{font-family:'Bowlby One';font-size:28px;letter-spacing:-1px;transform:rotate(-2deg);display:inline-block}.logo span{color:var(--hot)}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-link{font-weight:700;font-size:13px;border:2px solid var(--ink);padding:8px 18px;border-radius:999px;transition:all .2s;background:var(--bg)}
.nav-link:hover{background:var(--lime)}

.hero{background:var(--ink);color:var(--bg);padding:56px 40px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,.04) 1px,transparent 0);background-size:22px 22px}
.hero-in{max-width:1200px;margin:0 auto;position:relative}
.badge{display:inline-flex;align-items:center;gap:8px;background:var(--hot);color:#fff;font-family:'Bowlby One';font-size:11px;padding:7px 16px;border:2px solid var(--ink);border-radius:999px;margin-bottom:14px}
.hero h1{font-family:'Bowlby One';font-size:clamp(36px,6vw,64px);line-height:.9;letter-spacing:-2px}
.hero p{opacity:.75;margin-top:12px;font-size:15px}

.wrap{max-width:1200px;margin:0 auto;padding:50px 40px 100px}
.fav-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:22px}
.fav-card{border:3px solid var(--ink);border-radius:18px;overflow:hidden;background:var(--paper);box-shadow:var(--shadow);transition:all .22s;display:flex;flex-direction:column}
.fav-card:hover{transform:translate(-3px,-3px);box-shadow:var(--shadow-lg)}
.fav-img{aspect-ratio:1;display:grid;place-items:center;font-size:72px;border-bottom:3px solid var(--ink);background:var(--cream) center/cover no-repeat}
.fav-body{padding:16px;flex:1;display:flex;flex-direction:column;gap:6px}
.fav-name{font-weight:700;font-size:15px}
.fav-price{font-family:'Bowlby One';font-size:20px;color:var(--hot)}
.fav-actions{display:flex;gap:8px;margin-top:10px}
.btn-3d{flex:1;background:var(--ink);color:#fff;padding:11px;border-radius:10px;font-weight:700;font-size:13px;box-shadow:3px 3px 0 var(--lime);transition:all .2s}
.btn-3d:hover{background:var(--plum);transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--lime)}
.btn-rm{width:42px;border:2px solid var(--ink);border-radius:10px;font-size:16px;transition:all .15s;background:var(--bg)}
.btn-rm:hover{background:var(--hot);border-color:var(--hot)}
.btn-cart{width:100%;background:var(--hot);color:#fff;padding:11px;border-radius:10px;font-weight:700;font-size:13px;border:2px solid var(--ink);box-shadow:3px 3px 0 var(--ink);transition:all .15s;margin-bottom:8px}
.btn-cart:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--ink)}
.cart-nav{position:relative;width:42px;height:42px;border-radius:50%;border:2px solid var(--ink);display:grid;place-items:center;font-size:18px;background:var(--lime);cursor:pointer}
.cart-nav:hover{background:var(--hot)}
.sepet-count{position:absolute;top:-6px;right:-6px;background:var(--hot);color:#fff;width:20px;height:20px;border-radius:50%;font-size:11px;font-weight:700;display:none;place-items:center;border:2px solid var(--bg)}
.drawer-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);opacity:0;visibility:hidden;transition:.25s;z-index:500}
.drawer-ov.open{opacity:1;visibility:visible}
.drawer{position:fixed;top:0;right:0;width:380px;max-width:90vw;height:100%;background:var(--paper);border-left:3px solid var(--ink);transform:translateX(100%);transition:transform .3s;z-index:501;display:flex;flex-direction:column}
.drawer.open{transform:none}
.drawer-head{padding:18px 20px;border-bottom:3px solid var(--ink);display:flex;align-items:center;justify-content:space-between}
.drawer-head h3{font-family:'Bowlby One';font-size:18px}
.drawer-head button{font-size:22px;background:none;border:none;cursor:pointer;line-height:1}
.drawer-body{flex:1;overflow-y:auto;padding:14px 16px}
.dr-item{display:flex;gap:10px;align-items:center;border:2px solid var(--ink);border-radius:12px;padding:8px;margin-bottom:10px}
.dr-img{width:48px;height:48px;border-radius:8px;border:2px solid var(--ink);background:var(--cream) center/cover no-repeat;flex:none;display:grid;place-items:center;font-size:9px;opacity:.6;text-align:center}
.dr-info{flex:1;min-width:0}
.dr-name{font-weight:700;font-size:13px;line-height:1.2}
.dr-price{font-size:12px;color:var(--hot);font-weight:700;margin-top:2px}
.dr-qty{display:flex;align-items:center;gap:8px;margin-top:5px}
.dr-qty button{width:24px;height:24px;border:2px solid var(--ink);border-radius:6px;font-weight:700;background:var(--bg);cursor:pointer}
.dr-rm{background:none;border:none;font-size:16px;cursor:pointer;opacity:.6}.dr-rm:hover{opacity:1}
.dr-foot{padding:16px 20px;border-top:3px solid var(--ink)}
.dr-total{display:flex;justify-content:space-between;font-family:'Bowlby One';font-size:18px;margin-bottom:12px}
.dr-checkout{width:100%;background:var(--ink);color:#fff;padding:14px;border-radius:12px;font-family:'Bowlby One';font-size:14px;box-shadow:4px 4px 0 var(--hot);transition:.2s;cursor:pointer;border:none}
.dr-checkout:hover{background:var(--plum);transform:translate(-2px,-2px)}
.dr-empty{text-align:center;opacity:.5;padding:50px 10px;font-weight:600}

.empty{text-align:center;padding:90px 20px}
.empty .big{font-size:72px;margin-bottom:16px}
.empty h2{font-family:'Bowlby One';font-size:26px;margin-bottom:8px}
.empty p{opacity:.65;margin-bottom:24px}
.empty .cta{display:inline-block;background:var(--hot);color:#fff;padding:14px 28px;border-radius:999px;font-weight:700;border:3px solid var(--ink);box-shadow:var(--shadow);transition:all .2s}
.empty .cta:hover{transform:translate(-3px,-3px);box-shadow:var(--shadow-lg)}

.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--ink);color:var(--bg);padding:13px 26px;border-radius:999px;border:3px solid var(--hot);font-weight:700;font-size:14px;z-index:9999;transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:600px){.nav{padding:14px 18px}.nav-link{font-size:12px;padding:7px 12px}.wrap{padding:32px 16px 70px}.hero{padding:40px 20px}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="drawer-ov" id="drawerOv" onclick="sepetKapat()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head"><h3>🛒 Sepet</h3><button onclick="sepetKapat()" aria-label="Kapat">×</button></div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="dr-foot">
    <div class="dr-total"><span>Toplam</span><span id="drTotal">0₺</span></div>
    <button class="dr-checkout" onclick="sepetOnayla()">Siparişi Tamamla →</button>
  </div>
</div>
<nav class="nav">
  <a href="index.html" class="logo">Sticker<span>Lab.</span></a>
  <div class="nav-right">
    <a href="urunler.html" class="nav-link">Ürünler</a>
    <a href="index.html" class="nav-link">← Ana Sayfa</a>
    <button class="cart-nav" onclick="sepetAc()" title="Sepet">🛒<span class="sepet-count">0</span></button>
  </div>
</nav>

<div class="hero">
  <div class="hero-in">
    <div class="badge">❤️ Favorilerim</div>
    <h1>BEĞENDİKLERİN</h1>
    <p>Favori stickerlarını burada topladık. Birini 3D stüdyoda eşyaların üzerinde dene!</p>
  </div>
</div>

<div class="wrap">
  <div class="fav-grid" id="favGrid"></div>
</div>

<script src="ikas-config.js"></script>
<script src="sepet.js"></script>
<script src="favoriler.js"></script>
<script>
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600)}

function ciz(){
  const list = Fav.getir();
  const grid = document.getElementById('favGrid');
  if(!list.length){
    grid.innerHTML = `
      <div class="empty" style="grid-column:1/-1">
        <div class="big">💔</div>
        <h2>Henüz favorin yok</h2>
        <p>Ürünlerde ve paketlerde kalp 🤍 simgesine dokunarak favorilerine ekle.</p>
        <a href="urunler.html" class="cta">Stickerları Keşfet →</a>
      </div>`;
    return;
  }
  grid.innerHTML = list.map((f,i)=>`
    <div class="fav-card">
      <div class="fav-img" ${f.img?`style="background-image:url('${f.img}')"`:''}>${f.img?'':'<span style="font-size:13px;opacity:.4;font-weight:700">StickerLab</span>'}</div>
      <div class="fav-body">
        <div class="fav-name">${f.name}</div>
        ${f.fiyat?`<div class="fav-price">${f.fiyat}₺</div>`:''}
        <div class="fav-actions" style="flex-direction:column;align-items:stretch">
          <button class="btn-cart" onclick="sepeteEkle(${i})">🛒 Sepete Ekle</button>
          <div style="display:flex;gap:8px">
            <button class="btn-3d" onclick="ucBoyut(${i})">🎮 3D'de Gör</button>
            <button class="btn-rm" onclick="kaldir(${i})" title="Favorilerden çıkar">🗑</button>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function ucBoyut(i){
  const f = Fav.getir()[i];
  if(!f) return;
  toast(`🎮 "${f.name}" 3D stüdyoya gönderiliyor…`);
  setTimeout(()=>Fav.uc3DGonder(f), 500);
}
function kaldir(i){
  const f = Fav.getir()[i];
  if(!f) return;
  Fav.cikar(f.name);
  Fav.rozetGuncelle();
  toast(`🗑 "${f.name}" favorilerden çıkarıldı`);
  ciz();
}

function sepeteEkle(i){
  const f = Fav.getir()[i];
  if(!f) return;
  Sepet.ekle({name:f.name, fiyat:f.fiyat||0, img:f.img||''});
  toast(`🛒 "${f.name}" sepete eklendi`);
  sepetCiz();
}
function sepetAc(){ sepetCiz(); document.getElementById('drawer').classList.add('open'); document.getElementById('drawerOv').classList.add('open'); }
function sepetKapat(){ document.getElementById('drawer').classList.remove('open'); document.getElementById('drawerOv').classList.remove('open'); }
function sepetCiz(){
  const list = Sepet.getir();
  const body = document.getElementById('drawerBody');
  if(!list.length){
    body.innerHTML = '<div class="dr-empty">Sepetin boş.<br>Favorilerinden 🛒 ile ürün ekle.</div>';
  } else {
    body.innerHTML = list.map((it,idx)=>`
      <div class="dr-item">
        <div class="dr-img" ${it.img?`style="background-image:url('${it.img}')"`:''}>${it.img?'':'StickerLab'}</div>
        <div class="dr-info">
          <div class="dr-name">${it.name}</div>
          <div class="dr-price">${it.fiyat}₺</div>
          <div class="dr-qty">
            <button onclick="sepetAdet(${idx},-1)">−</button>
            <span>${it.adet}</span>
            <button onclick="sepetAdet(${idx},1)">+</button>
          </div>
        </div>
        <button class="dr-rm" onclick="sepetCikarIdx(${idx})" title="Çıkar">🗑</button>
      </div>`).join('');
  }
  document.getElementById('drTotal').textContent = Sepet.toplam()+'₺';
  Sepet.rozet();
}
function sepetAdet(idx,d){ const l=Sepet.getir(); if(l[idx]) Sepet.adetDegis(l[idx].name,d); sepetCiz(); }
function sepetCikarIdx(idx){ const l=Sepet.getir(); if(l[idx]) Sepet.cikar(l[idx].name); sepetCiz(); }
function sepetOnayla(){
  const list = Sepet.getir();
  if(!list.length){ toast('Sepetin boş'); return; }
  if(window.ikasAktif && window.ikasAktif()){ window.ikasGit(''); return; }
  const wa = window.IKAS && window.IKAS.waNumarasi;
  if(wa){
    const satirlar = list.map(i=>`• ${i.name} x${i.adet} — ${i.fiyat*i.adet}TL`).join('%0A');
    const mesaj = `Merhaba, siparis vermek istiyorum:%0A${satirlar}%0A%0ATOPLAM: ${Sepet.toplam()}TL`;
    window.open(`https://wa.me/${wa}?text=${mesaj}`,'_blank');
    return;
  }
  toast('Sipariş için İkas adresi veya WhatsApp numarası ekle (ikas-config.js)');
}

ciz();
sepetCiz();
</script>
</body>
</html>
